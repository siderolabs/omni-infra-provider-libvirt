# this deployment connects to libvirt on a remote host via SSH.
# the SSH key must be stored in a Secret and mounted into the container.
# ensure the SSH user has access to libvirt on the remote host.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: omni-infra-provider-libvirt
  namespace: default
data:
  config.yaml: |
    libvirt:
      uri: 'qemu+libssh://user@hostname/system?known_hosts_verify=ignore'
---
apiVersion: v1
kind: Secret
metadata:
  name: omni-infra-provider-libvirt
  namespace: default
type: Opaque
stringData:
  # fill in the correct values here
  OMNI_ENDPOINT: "https://your-omni-instance.example.com"
  OMNI_SERVICE_ACCOUNT_KEY: "your-service-account-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: omni-infra-provider-libvirt-ssh
  namespace: default
type: Opaque
stringData:
  # fill in the SSH private key here
  id_rsa: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    ...
    -----END OPENSSH PRIVATE KEY-----
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-infra-provider-libvirt
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omni-infra-provider-libvirt
  template:
    metadata:
      labels:
        app: omni-infra-provider-libvirt
    spec:
      containers:
        - name: omni-infra-provider-libvirt
          # replace TAG with a valid image tag
          image: ghcr.io/siderolabs/omni-infra-provider-libvirt:TAG
          args:
            - --config-file=/config.yaml
          envFrom:
            - secretRef:
                name: omni-infra-provider-libvirt
          env:
            - name: USER
              value: "omni"
          volumeMounts:
            - name: config
              mountPath: /config.yaml
              subPath: config.yaml
            - name: ssh-key
              mountPath: /.ssh
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: omni-infra-provider-libvirt
        - name: ssh-key
          secret:
            secretName: omni-infra-provider-libvirt-ssh
            defaultMode: 0400